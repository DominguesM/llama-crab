[package]
name = "llama-crab-sys"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Low-level FFI bindings to llama.cpp, ggml, gguf and mtmd (autogenerated via bindgen + cmake)"
links = "llama"
include = [
    "build.rs",
    "src/lib.rs",
    "wrappers/",
    "wrapper.h",
    # llama.cpp source is git-submoduled; we don't republish the C++ source.
]

[lib]
path = "src/lib.rs"

[lints]
workspace = true

[build-dependencies]
bindgen = { version = "0.69", default-features = false, features = ["runtime"] }
cc = { version = "1", features = ["parallel"] }
cmake = { version = "0.1", default-features = false }
glob = "0.3"
walkdir = "2"

[features]
default = ["openmp", "metal"]
# C++ `common` library — needed for chat templates, oaicompat, json schema
common = []
# GPU backends
cuda = []
cuda-no-vmm = ["cuda"]
metal = []
vulkan = []
rocm = []
openmp = []
# Linking modes
dynamic-link = []
shared-stdcxx = []
static-stdcxx = []
# GGML modes
system-ggml = []
system-ggml-static = []
dynamic-backends = []
# Multimodal
mtmd = ["common"]
# llguidance sampler
llguidance = []

[package.metadata.docs.rs]
features = ["mtmd"]
rustdoc-args = ["--cfg", "docsrs"]
