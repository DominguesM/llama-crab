# Build the mkdocs-material site and deploy it with GitHub Pages Actions.
#
# This workflow publishes the project site for DominguesM/llama-crab at:
#
#     https://dominguesm.github.io/llama-crab/
#
# It is intentionally manual-only so docs publishing does not run on every
# docs-only merge. To publish, run it from the Actions tab or with:
#
#     gh workflow run docs.yml --ref main
#
# Required setup:
# - In DominguesM/llama-crab, configure GitHub Pages as:
#   Settings -> Pages -> Source: GitHub Actions.
#
# Layout published by GitHub Pages:
#
#     /llama-crab/        <- redirect to /llama-crab/en/
#     /llama-crab/en/     <- English site (built from docs/mkdocs.yml, docs_dir=en)
#     /llama-crab/pt/     <- Portuguese site (built from docs/pt/mkdocs.yml, docs_dir=docs)
name: Publish docs site

'on':
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages-publish
  cancel-in-progress: false

jobs:
  build:
    name: Build mkdocs-material site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mkdocs-${{ hashFiles('docs/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-mkdocs-

      - name: Install mkdocs-material
        run: pip install -r docs/requirements.txt

      - name: Build English site
        working-directory: docs
        run: mkdocs build --strict --site-dir ../site_root/en

      - name: Build Portuguese site
        working-directory: docs/pt
        run: mkdocs build --strict --site-dir ../../site_root/pt

      - name: Add root redirect
        run: |
          cat > site_root/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <meta http-equiv="refresh" content="0; url=/llama-crab/en/">
              <link rel="canonical" href="/llama-crab/en/">
              <title>llama-crab documentation</title>
              <script>window.location.replace("/llama-crab/en/" + window.location.search + window.location.hash);</script>
            </head>
            <body>
              <p><a href="/llama-crab/en/">Continue to the llama-crab documentation</a>.</p>
            </body>
          </html>
          HTML
          cat > site_root/404.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <meta http-equiv="refresh" content="0; url=/llama-crab/en/">
              <link rel="canonical" href="/llama-crab/en/">
              <title>llama-crab documentation</title>
            </head>
            <body>
              <p><a href="/llama-crab/en/">Continue to the llama-crab documentation</a>.</p>
            </body>
          </html>
          HTML
          touch site_root/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site_root

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
