# Build the mkdocs-material site and publish the static output to
# DominguesM/llama-crab.github.io.
#
# This workflow is intentionally manual-only so docs publishing changes do not
# trigger the library CI/CD path when merged. To publish, run it from the
# Actions tab or with:
#
#     gh workflow run docs.yml --ref main
#
# Required setup:
# - Add a repository secret named DOCS_PAGES_TOKEN to DominguesM/llama-crab.
#   The token must have contents:write access to DominguesM/llama-crab.github.io.
# - In DominguesM/llama-crab.github.io, configure GitHub Pages as:
#   Settings -> Pages -> Source: Deploy from a branch, Branch: main, Folder: /.
#
# Default GitHub Pages URL:
# https://dominguesm.github.io/llama-crab.github.io/
#
# Layout published to the target repository:
#
#     /        <- English landing page
#     /en/     <- English site (built from docs/mkdocs.yml, docs_dir=en)
#     /pt/     <- Portuguese site (built from docs/pt/mkdocs.yml, docs_dir=docs)
name: Publish docs site

'on':
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-pages-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish mkdocs-material site
    runs-on: ubuntu-latest
    env:
      PAGES_REPOSITORY: DominguesM/llama-crab.github.io
      PAGES_BRANCH: main
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mkdocs-${{ hashFiles('docs/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-mkdocs-

      - name: Install mkdocs-material
        run: pip install -r docs/requirements.txt

      - name: Build English site
        working-directory: docs
        run: mkdocs build --strict --site-dir ../site_root/en

      - name: Build Portuguese site
        working-directory: docs/pt
        run: mkdocs build --strict --site-dir ../../site_root/pt

      - name: Make English the default landing page
        run: |
          cp site_root/en/index.html site_root/index.html
          cp site_root/en/404.html site_root/404.html || true
          touch site_root/.nojekyll

      - name: Publish to DominguesM/llama-crab.github.io
        env:
          DOCS_PAGES_TOKEN: ${{ secrets.DOCS_PAGES_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${DOCS_PAGES_TOKEN:-}" ]]; then
            echo "::error::DOCS_PAGES_TOKEN is required to publish ${PAGES_REPOSITORY}"
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          repo_url="https://x-access-token:${DOCS_PAGES_TOKEN}@github.com/${PAGES_REPOSITORY}.git"
          git clone --depth 1 "$repo_url" pages_repo

          rsync -a --delete --exclude '.git' site_root/ pages_repo/

          cd pages_repo
          git add -A

          if git diff --cached --quiet; then
            echo "No documentation changes to publish."
            exit 0
          fi

          git commit -m "docs: publish llama-crab site from ${GITHUB_SHA::7}"
          git push origin "HEAD:${PAGES_BRANCH}"
