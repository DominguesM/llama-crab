# Build the Docusaurus site and deploy it with GitHub Pages Actions.
#
# This workflow publishes the project site for DominguesM/llama-crab at:
#
#     https://dominguesm.github.io/llama-crab/
#
# It is intentionally manual-only so docs publishing does not run on every
# docs-only merge. To publish, run it from the Actions tab or with:
#
#     gh workflow run docs.yml --ref main
#
# Required setup:
# - In DominguesM/llama-crab, configure GitHub Pages as:
#   Settings -> Pages -> Source: GitHub Actions.
#
name: Publish docs site

'on':
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages-publish
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: docs
        run: pnpm install --no-frozen-lockfile

      - name: Build documentation
        working-directory: docs
        run: pnpm build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/build

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
