name: Coverage

on:
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: cargo-llvm-cov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Run coverage (lib only)
        run: |
          cargo llvm-cov -p llama-crab --no-default-features --features openmp --lib --summary-only
      - name: Run coverage (with mtmd + disk-cache)
        run: |
          cargo llvm-cov -p llama-crab --no-default-features --features openmp,mtmd,disk-cache --lib --summary-only
      - name: Coverage gate (lib + tests)
        # Enforce a baseline close to the current lib coverage.
        run: |
          cargo llvm-cov -p llama-crab --no-default-features --features openmp --lib --json --output-path cov.json
          python3 - <<'PY'
          import json, sys
          minimum = 0.45
          data = json.load(open("cov.json"))
          totals = data["data"][0]["totals"]["lines"]
          pct = totals["percent"] / 100.0
          print(f"line coverage: {pct*100:.1f}%")
          if pct < minimum:
              print(f"::error::Coverage {pct*100:.1f}% is below {minimum*100:.1f}%")
              sys.exit(1)
          PY
