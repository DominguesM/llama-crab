name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C link-arg=-s

jobs:
  coverage:
    name: cargo-llvm-cov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Run coverage (lib only)
        run: |
          cargo llvm-cov --no-default-features --lib --summary-only
      - name: Run coverage (with mtmd + disk-cache)
        run: |
          cargo llvm-cov --features mtmd,disk-cache --lib --summary-only
      - name: Coverage gate (lib + tests)
        # Enforce >= 80% lines coverage on the lib target.
        run: |
          cargo llvm-cov --no-default-features --lib --json --output-path cov.json
          python3 - <<'PY'
          import json, sys
          data = json.load(open("cov.json"))
          totals = data["data"][0]["totals"]["lines"]
          pct = totals["percent"] / 100.0
          print(f"line coverage: {pct*100:.1f}%")
          if pct < 0.80:
              print(f"::error::Coverage {pct*100:.1f}% is below 80%")
              sys.exit(1)
          PY
