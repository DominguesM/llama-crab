name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate packaging without publishing to crates.io"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: crates-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@1.88

      - name: Read workspace version
        id: version
        shell: bash
        run: |
          version=$(python3 - <<'PY'
          import tomllib

          with open("Cargo.toml", "rb") as f:
              cargo = tomllib.load(f)
          print(cargo["workspace"]["package"]["version"])
          PY
          )
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate release metadata
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "v${VERSION}" ]]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match workspace version v${VERSION}"
            exit 1
          fi

          python3 - <<'PY'
          import pathlib
          import tomllib

          root = pathlib.Path(".")
          with (root / "Cargo.toml").open("rb") as f:
              workspace = tomllib.load(f)

          version = workspace["workspace"]["package"]["version"]
          crates = {
              "llama-crab-sys": root / "crates" / "llama-crab-sys" / "Cargo.toml",
              "llama-crab": root / "crates" / "llama-crab" / "Cargo.toml",
              "llama-crab-server": root / "crates" / "llama-crab-server" / "Cargo.toml",
          }

          manifests = {}
          for crate, path in crates.items():
              with path.open("rb") as f:
                  manifest = tomllib.load(f)
              package = manifest["package"]
              if package["name"] != crate:
                  raise SystemExit(f"{path}: expected package name {crate}, got {package['name']}")
              package_version = version if package.get("version", {}).get("workspace") else package.get("version")
              if package_version != version:
                  raise SystemExit(f"{crate}: version {package_version} does not match workspace {version}")
              if package.get("publish") is False:
                  raise SystemExit(f"{crate}: publish=false prevents crates.io deployment")
              manifests[crate] = manifest

          sys_dep = manifests["llama-crab"]["dependencies"]["llama-crab-sys"]
          if sys_dep.get("version") != version:
              raise SystemExit("llama-crab dependency on llama-crab-sys must match the workspace version")

          core_dep = manifests["llama-crab-server"]["dependencies"]["llama-crab"]
          if core_dep.get("version") != version:
              raise SystemExit("llama-crab-server dependency on llama-crab must match the workspace version")

          print(f"release metadata ok for {', '.join(crates)} {version}")
          PY

      - name: Publish crates
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          version_exists() {
            python3 - "$1" "$VERSION" <<'PY'
          import sys
          import urllib.request

          crate, version = sys.argv[1], sys.argv[2]
          try:
              with urllib.request.urlopen(f"https://crates.io/api/v1/crates/{crate}/{version}", timeout=20) as response:
                  sys.exit(0 if response.status == 200 else 1)
          except Exception:
              sys.exit(1)
          PY
          }

          wait_for_crate() {
            local crate="$1"
            for attempt in {1..30}; do
              if version_exists "$crate"; then
                echo "$crate $VERSION is visible in the crates.io index"
                return 0
              fi
              echo "waiting for $crate $VERSION in crates.io index ($attempt/30)"
              sleep 10
            done
            echo "::error::$crate $VERSION did not appear in the crates.io index"
            return 1
          }

          publish_crate() {
            local crate="$1"
            local args=(publish -p "$crate" --no-verify)

            if [[ "$DRY_RUN" == "true" ]]; then
              if [[ "$crate" == "llama-crab" ]] && ! version_exists llama-crab-sys; then
                echo "::notice::$crate publish dry-run needs llama-crab-sys $VERSION in crates.io; listing package contents instead"
                cargo package -p "$crate" --list
                return 0
              fi
              if [[ "$crate" == "llama-crab-server" ]] && ! version_exists llama-crab; then
                echo "::notice::$crate publish dry-run needs llama-crab $VERSION in crates.io; listing package contents instead"
                cargo package -p "$crate" --list
                return 0
              fi
              echo "dry-run publishing $crate $VERSION"
              args+=(--dry-run)
            elif version_exists "$crate"; then
              echo "$crate $VERSION is already published"
              return 0
            elif [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
              echo "::error::CARGO_REGISTRY_TOKEN is required to publish $crate"
              return 1
            fi

            if [[ -n "${CARGO_REGISTRY_TOKEN:-}" ]]; then
              args+=(--token "$CARGO_REGISTRY_TOKEN")
            fi

            cargo "${args[@]}"

            if [[ "$DRY_RUN" != "true" ]]; then
              wait_for_crate "$crate"
            fi
          }

          publish_crate llama-crab-sys
          publish_crate llama-crab
          publish_crate llama-crab-server
