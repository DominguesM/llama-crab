name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.86
      - name: Publish llama-crab-sys
        run: cargo publish -p llama-crab-sys --no-verify --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish llama-crab
        run: cargo publish -p llama-crab --no-verify --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
