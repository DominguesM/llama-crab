name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate packaging without publishing to crates.io or npm"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: package-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish crates and npm packages
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@1.88

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: "@llama-crab"
          cache: pnpm

      - name: Read workspace version
        id: version
        shell: bash
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | node -e '
          let input = "";
          process.stdin.on("data", (chunk) => input += chunk);
          process.stdin.on("end", () => {
            const metadata = JSON.parse(input);
            const crate = metadata.packages.find((pkg) => pkg.name === "llama-crab");
            if (!crate) {
              throw new Error("llama-crab crate not found in cargo metadata");
            }
            process.stdout.write(crate.version);
          });
          '
          )
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate release metadata
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "v${VERSION}" ]]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match workspace version v${VERSION}"
            exit 1
          fi

          node <<'JS'
          const fs = require("fs");
          const { execFileSync } = require("child_process");

          const version = process.env.VERSION;
          const metadata = JSON.parse(execFileSync("cargo", ["metadata", "--no-deps", "--format-version", "1"], { encoding: "utf8" }));
          const crateNames = [
            "llama-crab-sys",
            "llama-crab",
            "llama-crab-server",
            "tauri-plugin-llama-crab",
          ];

          const crates = new Map(metadata.packages.map((pkg) => [pkg.name, pkg]));
          for (const crateName of crateNames) {
            const crate = crates.get(crateName);
            if (!crate) {
              throw new Error(`${crateName} is missing from cargo metadata`);
            }
            if (crate.version !== version) {
              throw new Error(`${crateName} version ${crate.version} does not match ${version}`);
            }
            if (Array.isArray(crate.publish) && crate.publish.length === 0) {
              throw new Error(`${crateName} has publish=false`);
            }
          }

          const packagePaths = ["packages/core/package.json", "packages/tauri/package.json"];
          for (const packagePath of packagePaths) {
            const pkg = JSON.parse(fs.readFileSync(packagePath, "utf8"));
            if (pkg.private === true) {
              throw new Error(`${pkg.name} is private and cannot be published`);
            }
            if (pkg.version !== version) {
              throw new Error(`${pkg.name} version ${pkg.version} does not match ${version}`);
            }
            if (pkg.publishConfig?.access !== "public") {
              throw new Error(`${pkg.name} must set publishConfig.access=public`);
            }
          }

          console.log(`release metadata ok for ${crateNames.join(", ")} and @llama-crab npm packages ${version}`);
          JS

      - name: Publish crates
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          version_exists() {
            curl --fail --silent --show-error \
              --user-agent "llama-crab-release-ci" \
              "https://crates.io/api/v1/crates/$1/$VERSION" \
              >/dev/null
          }

          wait_for_crate() {
            local crate="$1"
            for attempt in {1..30}; do
              if version_exists "$crate"; then
                echo "$crate $VERSION is visible in the crates.io index"
                return 0
              fi
              echo "waiting for $crate $VERSION in crates.io index ($attempt/30)"
              sleep 10
            done
            echo "::error::$crate $VERSION did not appear in the crates.io index"
            return 1
          }

          publish_crate() {
            local crate="$1"
            local dependency="${2:-}"
            local args=(publish -p "$crate" --no-verify)

            if [[ "$DRY_RUN" == "true" ]]; then
              if [[ -n "$dependency" ]] && ! version_exists "$dependency"; then
                echo "::notice::$crate publish dry-run needs $dependency $VERSION in crates.io; listing package contents instead"
                cargo package -p "$crate" --list
                return 0
              fi
              echo "dry-run publishing $crate $VERSION"
              args+=(--dry-run)
            elif version_exists "$crate"; then
              echo "$crate $VERSION is already published"
              return 0
            elif [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
              echo "::error::CARGO_REGISTRY_TOKEN is required to publish $crate"
              return 1
            fi

            if [[ -n "${CARGO_REGISTRY_TOKEN:-}" ]]; then
              args+=(--token "$CARGO_REGISTRY_TOKEN")
            fi

            cargo "${args[@]}"

            if [[ "$DRY_RUN" != "true" ]]; then
              wait_for_crate "$crate"
            fi
          }

          publish_crate llama-crab-sys
          publish_crate llama-crab llama-crab-sys
          publish_crate llama-crab-server llama-crab
          publish_crate tauri-plugin-llama-crab llama-crab

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build npm packages
        run: pnpm --filter @llama-crab/core --filter @llama-crab/tauri build

      - name: Publish npm packages
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          npm_version_exists() {
            npm view "$1@$VERSION" version --registry https://registry.npmjs.org >/dev/null 2>&1
          }

          publish_npm_package() {
            local package="$1"

            if [[ "$DRY_RUN" == "true" ]]; then
              echo "dry-run publishing $package $VERSION"
              pnpm --filter "$package" publish --dry-run --access public --no-git-checks
              return 0
            fi

            if npm_version_exists "$package"; then
              echo "$package $VERSION is already published"
              return 0
            fi

            if [[ -z "${NPM_TOKEN:-}" ]]; then
              echo "::error::NPM_TOKEN is required to publish $package"
              return 1
            fi

            pnpm --filter "$package" publish --access public --no-git-checks
          }

          publish_npm_package @llama-crab/core
          publish_npm_package @llama-crab/tauri
