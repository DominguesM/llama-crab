name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev
          cargo clippy -p llama-crab-sys --no-default-features --features openmp,mtmd --all-targets
          cargo clippy -p llama-crab --no-default-features --features openmp,mtmd,disk-cache --all-targets
      - name: macOS
        if: matrix.os == 'macos-latest'
        run: |
          cargo clippy -p llama-crab-sys --no-default-features --features metal,mtmd --all-targets
          cargo clippy -p llama-crab --no-default-features --features metal,mtmd,disk-cache --all-targets

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-openmp
            os: ubuntu-latest
            features: openmp
          - name: linux-vulkan
            os: ubuntu-latest
            features: openmp,vulkan
          - name: linux-mtmd
            os: ubuntu-latest
            features: openmp,mtmd,disk-cache
          - name: macos-metal
            os: macos-latest
            features: metal
          - name: macos-mtmd
            os: macos-latest
            features: metal,mtmd,disk-cache
          - name: windows-minimal
            os: windows-latest
            features: ""
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install Vulkan (Linux)
        if: matrix.os == 'ubuntu-latest' && contains(matrix.features, 'vulkan')
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev mesa-vulkan-drivers vulkan-tools
      - name: Build workspace
        shell: bash
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo build -p llama-crab-sys --no-default-features --features "${{ matrix.features }}"
            cargo build -p llama-crab --no-default-features --features "${{ matrix.features }}"
          else
            cargo build -p llama-crab-sys --no-default-features
            cargo build -p llama-crab --no-default-features
          fi

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev
          cargo test -p llama-crab --no-default-features --features openmp,mtmd,disk-cache
      - name: macOS
        if: matrix.os == 'macos-latest'
        run: cargo test -p llama-crab --no-default-features --features metal,mtmd,disk-cache

  doc:
    name: Doc (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Document llama-crab
        run: RUSTDOCFLAGS="-D warnings" cargo doc -p llama-crab --no-deps --no-default-features --features openmp,mtmd
      - name: Document llama-crab-sys
        run: cargo doc -p llama-crab-sys --no-deps --no-default-features --features openmp,mtmd
