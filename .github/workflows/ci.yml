name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: macos-latest
            features: ""
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev
          cargo clippy -p llama-crab-sys --all-targets
          cargo clippy -p llama-crab --all-features --all-targets
      - name: macOS
        if: matrix.os == 'macos-latest'
        run: |
          cargo clippy -p llama-crab-sys --all-targets
          cargo clippy -p llama-crab --features metal,mtmd,disk-cache --all-targets

  build:
    name: Build (${{ matrix.os }}, ${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        features:
          - ""
          - metal
          - vulkan
        include:
          - os: macos-latest
            features: metal
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install Vulkan (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.features == 'vulkan'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev mesa-vulkan-drivers vulkan-tools
      - run: cargo build --workspace --features ${{ matrix.features }}
      - run: cargo build --workspace --no-default-features

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev
          cargo test --workspace --all-features
      - name: macOS
        if: matrix.os == 'macos-latest'
        run: cargo test --workspace --all-features

  doc:
    name: Doc (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo doc -p llama-crab --no-deps --all-features
      - run: cargo doc -p llama-crab-sys --no-deps

