name: CI

on:
  pull_request:
    branches: [develop, main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo clippy -p llama-crab-sys --no-default-features --all-targets
          cargo clippy -p llama-crab --no-default-features --features common,mtmd,hf-tokenizer,disk-cache --all-targets
          cargo clippy -p llama-crab-server --all-targets
          cargo clippy -p llama-crab-server --features mtmd --all-targets
      - name: macOS
        if: matrix.os == 'macos-latest'
        run: |
          cargo clippy -p llama-crab-sys --no-default-features --all-targets
          cargo clippy -p llama-crab --no-default-features --features common,mtmd,hf-tokenizer,disk-cache --all-targets
          cargo clippy -p llama-crab-server --all-targets
          cargo clippy -p llama-crab-server --features mtmd --all-targets

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-none
            os: ubuntu-latest
            features: ""
          - name: linux-common
            os: ubuntu-latest
            features: common
          - name: linux-mtmd
            os: ubuntu-latest
            features: mtmd
          - name: linux-hf-tokenizer
            os: ubuntu-latest
            features: hf-tokenizer
          - name: linux-disk-cache
            os: ubuntu-latest
            features: disk-cache
          - name: linux-combo
            os: ubuntu-latest
            features: common,mtmd,hf-tokenizer
          - name: linux-server-mtmd
            os: ubuntu-latest
            features: ""
          - name: macos-none
            os: macos-latest
            features: ""
          - name: macos-common
            os: macos-latest
            features: common
          - name: macos-mtmd
            os: macos-latest
            features: mtmd
          - name: macos-hf-tokenizer
            os: macos-latest
            features: hf-tokenizer
          - name: macos-disk-cache
            os: macos-latest
            features: disk-cache
          - name: macos-combo
            os: macos-latest
            features: common,mtmd,hf-tokenizer
          - name: macos-server-mtmd
            os: macos-latest
            features: ""
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Build workspace
        shell: bash
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo build -p llama-crab --no-default-features --features "${{ matrix.features }}"
          else
            cargo build -p llama-crab --no-default-features
          fi
          cargo build -p llama-crab-server
      - name: Build server mtmd
        if: contains(matrix.name, 'server-mtmd')
        run: cargo build -p llama-crab-server --features mtmd

  feature-surface:
    name: Feature surface (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Check optional Linux-safe features
        env:
          RUSTFLAGS: ""
        run: |
          cargo check -p llama-crab --no-default-features
          cargo check -p llama-crab --no-default-features --features common
          cargo check -p llama-crab --no-default-features --features mtmd
          cargo check -p llama-crab --no-default-features --features hf-tokenizer
          cargo check -p llama-crab --no-default-features --features disk-cache
          cargo check -p llama-crab --no-default-features --features common,mtmd,hf-tokenizer
          cargo check -p llama-crab --no-default-features --features dynamic-link,opencl
          cargo check -p llama-crab --no-default-features --features dynamic-link,kleidiai
          cargo check -p llama-crab --no-default-features --features dynamic-link,opencl,kleidiai

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo test -p llama-crab --no-default-features --features common,mtmd,disk-cache
          cargo test -p llama-crab-server
          cargo test -p llama-crab-server --features mtmd
      - name: macOS
        if: matrix.os == 'macos-latest'
        run: |
          cargo test -p llama-crab --no-default-features --features common,mtmd,disk-cache
          cargo test -p llama-crab-server
          cargo test -p llama-crab-server --features mtmd

  doc:
    name: Doc (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Document llama-crab
        run: RUSTDOCFLAGS="--cfg docsrs -D warnings" cargo +nightly doc -p llama-crab --no-deps --no-default-features --features common,mtmd
      - name: Document llama-crab-sys
        run: RUSTDOCFLAGS="--cfg docsrs -D warnings" cargo +nightly doc -p llama-crab-sys --no-deps --no-default-features --features common,mtmd
