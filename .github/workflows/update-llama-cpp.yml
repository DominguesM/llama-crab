name: Update llama.cpp

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Update submodule
        run: |
          cd llama-crab-sys/llama.cpp
          git fetch --tags origin
          LATEST=$(git tag --sort=-version:refname | grep -E '^b[0-9]+$' | head -1)
          echo "Latest llama.cpp release: $LATEST"
          echo "LATEST=$LATEST" >> "$GITHUB_ENV"
          git checkout "$LATEST"
          cd ../..
      - name: Check for changes
        id: check
        run: |
          if git diff --quiet -- llama-crab-sys/llama.cpp; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git switch -c update-llama-cpp
            git add llama-crab-sys/llama.cpp
            git commit -m "chore(sys): bump llama.cpp to $LATEST"
            git push --force-with-lease origin update-llama-cpp
          fi
      - name: Open PR
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --head update-llama-cpp --base develop --json number --jq 'length')
          if [ "$existing" -eq 0 ]; then
            gh pr create \
            --title "chore(sys): bump llama.cpp to ${{ env.LATEST }}" \
            --body "Automated submodule bump." \
            --base develop \
            --head update-llama-cpp
          fi
