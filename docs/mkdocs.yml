site_name: llama-crab
site_description: Safe, ergonomic and complete Rust bindings for llama.cpp
site_author: llama-crab contributors
site_url: https://dominguesm.github.io/llama-crab.github.io/

repo_name: DominguesM/llama-crab
repo_url: https://github.com/DominguesM/llama-crab
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024 - 2026 llama-crab contributors

docs_dir: en

theme:
  name: material
  language: en
  custom_dir: overrides
  logo: assets/images/logo.png
  favicon: assets/images/logo.png

  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to system preference

  font:
    text: Inter
    code: JetBrains Mono

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra:
  alternate:
    - name: English
      link: /llama-crab.github.io/en/
      lang: en
    - name: Português (Brasil)
      link: /llama-crab.github.io/pt/
      lang: pt-BR
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DominguesM/llama-crab
      name: llama-crab on GitHub
    - icon: fontawesome/brands/rust
      link: https://crates.io/crates/llama-crab
      name: llama-crab on crates.io
    - icon: material/book-open-variant
      link: https://docs.rs/llama-crab
      name: llama-crab on docs.rs
  generator: false

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      auto_title: false
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - ../assets/css/extra.css

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Your first program: getting-started/first-program.md
    - Cargo features: getting-started/cargo-features.md
    - Project layout: getting-started/project-layout.md
  - Core Concepts:
    - core-concepts/index.md
    - Architecture: core-concepts/architecture.md
    - Lifecycle: core-concepts/lifecycle.md
    - Error handling: core-concepts/errors.md
  - Guides:
    - guides/index.md
    - Backends & GPU offload: guides/backends.md
    - Mobile distribution: guides/mobile.md
    - Sampling strategies: guides/sampling.md
    - Caching & session state: guides/caching.md
  - Features:
    - features/index.md
    - Text completion: features/text-completion.md
    - Chat & tool calling: features/chat.md
    - Multimodal (vision + audio): features/multimodal.md
    - Embeddings & reranking: features/embeddings.md
    - JSON-Schema & GBNF grammars: features/grammars.md
    - Speculative decoding: features/speculative.md
    - Stateful chat: features/stateful-chat.md
  - Server:
    - server/index.md
    - Running the server: server/running.md
    - API reference: server/api.md
    - Streaming: server/streaming.md
    - Structured output: server/structured.md
  - Examples:
    - examples/index.md
    - Quickstart: examples/quickstart.md
    - Plain completion: examples/simple.md
    - Streaming: examples/streaming.md
    - Multi-turn chat: examples/chat.md
    - Stateful REPL: examples/stateful-chat.md
    - Vision (mtmd): examples/vision.md
    - Raw mtmd.h API: examples/mtmd.md
    - Embeddings: examples/embeddings.md
    - Semantic search: examples/embedding-search.md
    - Reranker: examples/reranker.md
    - Tool calling: examples/tools.md
    - Structured output: examples/structured.md
    - Speculative decoding: examples/speculative.md
  - Recipes:
    - recipes/index.md
    - Performance tuning: recipes/performance.md
    - Choosing a model: recipes/choosing-a-model.md
    - Building a chatbot: recipes/chatbot.md
    - Building a RAG pipeline: recipes/rag.md
  - Reference:
    - reference/index.md
    - Crate layout: reference/crate-layout.md
    - Cargo features: reference/cargo-features.md
    - Built-in chat templates: reference/chat-templates.md
    - MSRV & versioning: reference/msrv.md
  - Troubleshooting: troubleshooting.md
  - About:
    - about/index.md
    - Changelog: about/changelog.md
    - Contributing: about/contributing.md
    - License: about/license.md
    - Acknowledgements: about/acknowledgements.md
