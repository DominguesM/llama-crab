site_name: llama-crab
site_description: Bindings Rust seguros, ergonômicos e completos para llama.cpp
site_author: Contribuidores do llama-crab
site_url: https://dominguesm.github.io/llama-crab.github.io/pt/

repo_name: DominguesM/llama-crab
repo_url: https://github.com/DominguesM/llama-crab
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024 - 2026 contribuidores do llama-crab

docs_dir: docs

theme:
  name: material
  language: pt
  custom_dir: ../overrides
  logo: assets/images/logo.png
  favicon: assets/images/logo.png

  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Alternar para modo claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-night
        name: Alternar para preferência do sistema

  font:
    text: Inter
    code: JetBrains Mono

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra:
  alternate:
    - name: English
      link: /llama-crab.github.io/en/
      lang: en
    - name: Português (Brasil)
      link: /llama-crab.github.io/pt/
      lang: pt-BR
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DominguesM/llama-crab
      name: llama-crab no GitHub
    - icon: fontawesome/brands/rust
      link: https://crates.io/crates/llama-crab
      name: llama-crab no crates.io
    - icon: material/book-open-variant
      link: https://docs.rs/llama-crab
      name: llama-crab no docs.rs
  generator: false

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: Nesta página
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      auto_title: false
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify:
        !!python/object/apply:pymdownx.slugs.slugify { kwds: { case: lower } }
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - ../../assets/css/extra.css

nav:
  - Início: index.md
  - Primeiros Passos:
      - getting-started/index.md
      - Instalação: getting-started/installation.md
      - Seu primeiro programa: getting-started/first-program.md
      - Features do Cargo: getting-started/cargo-features.md
      - Estrutura do projeto: getting-started/project-layout.md
  - Conceitos Fundamentais:
      - core-concepts/index.md
      - Arquitetura: core-concepts/architecture.md
      - Ciclo de vida: core-concepts/lifecycle.md
      - Tratamento de erros: core-concepts/errors.md
  - Guias:
      - guides/index.md
      - Backends & offload de GPU: guides/backends.md
      - Distribuição mobile: guides/mobile.md
      - Estratégias de amostragem: guides/sampling.md
      - Cache & estado de sessão: guides/caching.md
  - Funcionalidades:
      - features/index.md
      - Completions de texto: features/text-completion.md
      - Chat & tool calling: features/chat.md
      - Multimodal (visão + áudio): features/multimodal.md
      - Embeddings & reranking: features/embeddings.md
      - JSON-Schema & gramáticas GBNF: features/grammars.md
      - Decodificação especulativa: features/speculative.md
      - Chat com estado: features/stateful-chat.md
  - Servidor:
      - server/index.md
      - Executando o servidor: server/running.md
      - Referência da API: server/api.md
      - Streaming: server/streaming.md
      - Saída estruturada: server/structured.md
  - Exemplos:
      - examples/index.md
      - Quickstart: examples/quickstart.md
      - Completions simples: examples/simple.md
      - Streaming: examples/streaming.md
      - Chat multi-turno: examples/chat.md
      - REPL com estado: examples/stateful-chat.md
      - Visão (mtmd): examples/vision.md
      - API mtmd.h bruta: examples/mtmd.md
      - Embeddings: examples/embeddings.md
      - Busca semântica: examples/embedding-search.md
      - Reranker: examples/reranker.md
      - Tool calling: examples/tools.md
      - Saída estruturada: examples/structured.md
      - Decodificação especulativa: examples/speculative.md
  - Receitas:
      - recipes/index.md
      - Ajuste de performance: recipes/performance.md
      - Escolhendo um modelo: recipes/choosing-a-model.md
      - Construindo um chatbot: recipes/chatbot.md
      - Construindo um pipeline RAG: recipes/rag.md
  - Referência:
      - reference/index.md
      - Layout dos crates: reference/crate-layout.md
      - Features do Cargo: reference/cargo-features.md
      - Templates de chat embutidos: reference/chat-templates.md
      - MSRV & versionamento: reference/msrv.md
  - Solução de problemas: troubleshooting.md
  - Sobre:
      - about/index.md
      - Changelog: about/changelog.md
      - Contribuindo: about/contributing.md
      - Licença: about/license.md
      - Agradecimentos: about/acknowledgements.md
