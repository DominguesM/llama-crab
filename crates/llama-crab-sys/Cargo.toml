[package]
name = "llama-crab-sys"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Low-level FFI bindings to llama.cpp, ggml, gguf and mtmd (autogenerated via bindgen + cmake)"
readme = "README.md"
links = "llama"
include = [
    "README.md",
    "build.rs",
    "src/lib.rs",
    "wrappers/",
    "wrapper.h",
    "llama.cpp/AUTHORS",
    "llama.cpp/CMakeLists.txt",
    "llama.cpp/LICENSE",
    "llama.cpp/cmake/",
    "llama.cpp/common/",
    "llama.cpp/ggml/",
    "llama.cpp/include/",
    "llama.cpp/src/",
    "llama.cpp/tools/mtmd/",
    "llama.cpp/vendor/",
]

[lib]
path = "src/lib.rs"

# Bindgen-generated code can't have rustdoc; we don't use the
# workspace lints here.
[lints.rust]
missing_docs = "allow"
unsafe_op_in_unsafe_fn = "warn"

[lints.clippy]
pedantic = { level = "allow", priority = -1 }

[build-dependencies]
bindgen = { version = "0.69", default-features = false, features = ["runtime"] }
cc = { version = "1", features = ["parallel"] }
cmake = { version = "0.1", default-features = false }
glob = "0.3"
walkdir = "2"

[features]
default = ["openmp", "metal"]
# C++ `common` library used by chat templates and JSON schema helpers.
common = []
# GPU backends
cuda = []
cuda-no-vmm = ["cuda"]
metal = []
vulkan = []
rocm = []
opencl = []
openmp = []
kleidiai = []
# Linking modes
dynamic-link = []
shared-stdcxx = []
static-stdcxx = []
# GGML modes
system-ggml = []
system-ggml-static = []
dynamic-backends = []
# Multimodal
mtmd = ["common"]
# llguidance sampler
llguidance = []

[package.metadata.docs.rs]
no-default-features = true
features = ["openmp", "mtmd"]
rustdoc-args = ["--cfg", "docsrs"]
